profile:
  name: António Pereira
  givenName: António
  familyName: Pereira
  shortName: António
  initials: AP

  # Headline — per-variant override
  headline:
    site: OutSystems Architect & Champion
    full: OutSystems Champion · Certified Expert · Leading Teams to Deliver Business Value

  # Summary — per-variant override
  summary:
    site: >-
      Senior OutSystems Solution Architect with a decade of experience designing,
      delivering, and scaling enterprise applications. OutSystems Champion since
      2022 and Architecture Specialist (O11 + ODC) since 2022 — with 3+ years of
      formal architecture practice leadership across KinetIT and Babel (Top
      OutSystems Partner Worldwide). Career spans R&D engineering at OutSystems,
      delivery management for enterprise consultancies, and current Solution
      Architect role at Babel.
    full: |
      "Finding the true form of the problem is more important than the answer that comes after."

      As a seasoned software engineer with over 10 years of experience, I have developed expertise in building scalable and reliable web and mobile applications using OutSystems and other technologies. I am passionate about developing innovative solutions that meet business requirements and exceed user expectations.

      Throughout my career, I have worked in various roles and industries, ranging from start-ups to enterprise-level organizations. As a result, I have gained experience in leading development teams, managing client relationships, and collaborating with stakeholders to ensure the timely delivery of projects.

      I am skilled in OutSystems, .NET, C#, and SQL Server, among other programming languages and tools. I am also adept at using agile methodologies to manage projects and ensure quality and efficiency. I am constantly seeking opportunities to grow my skills and knowledge, and I am always willing to take on new challenges.

  subheadline: I help engineering teams design, deliver, and scale OutSystems solutions that move the business — not just ship the build.

  location: Lisbon, Portugal
  locationDetail:
    locality: Lisbon
    region: Lisbon
    country: Portugal
    countryCode: PT
  nationality: Portuguese
  availability: Open to senior architect & engineering leadership roles
  availabilityIso: 2026-01-01
  remote: Open to remote across EU & UK

  email: antonio.pereira.professional@outlook.com
  linkedin: https://www.linkedin.com/in/antonioppereira/
  github: https://github.com/antonioppereira
  outsystems: https://www.outsystems.com/profile/olcy67xggw/

  photoUrl: portrait.jpg
  resumeUrl: Antonio-Pereira-CV.pdf

  quote: Finding the true form of the problem is more important than the answer that comes after.

