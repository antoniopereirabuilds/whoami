# ──────────────────────────────────────────────────
# About — long-form prose paragraphs
# ──────────────────────────────────────────────────
about:
  - text: I'm a senior software engineer and architect with a decade of building scalable web and mobile applications — most of that time spent close to the OutSystems platform, from inside R&D to leading delivery teams for enterprise clients.
  - text: "I've shipped product features at OutSystems itself, set the technical direction for delivery teams as a Delivery Manager, and now design and audit enterprise architectures at Babel. The thread through all of it: turning ambiguous business problems into systems that are robust, fast to evolve, and a pleasure to maintain."
  - text: Beyond the code, I care about how teams work. I've built knowledge bases, run certification tracks, mentored developers into seniors, and aligned stakeholders around technical decisions that actually stick.
  - text: Based in Lisbon, where I live with my wife and three kids — they are the reason I optimize for clarity and the reason I keep showing up.

