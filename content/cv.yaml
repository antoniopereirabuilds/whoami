# ============================================================
# CV CONTENT POOL — single source of truth
# ============================================================
#
# Edit this file to update everything that appears on the live
# site, the printed CV, the JSON Resume export, llms.txt and
# llms-full.txt.
#
# Variants
# --------
# Each item below can declare `variants: [name, name]` to say
# which CVs it should appear in. If `variants:` is omitted, the
# item appears in ALL variants (the common case).
#
# Defined variants:
#   site  — what shows on antoniopereirabuilds.github.io/whoami
#   full  — exhaustive LinkedIn-equivalent depth (long PDF)
#
# Per-variant text overrides (headline, summary, etc.) can use
# a map keyed by variant name. A plain string applies to all.
# ============================================================

variants:
  site:
    label: Live site
    description: Curated, 6 most relevant roles for the live web profile.
  full:
    label: Full history
    description: LinkedIn-equivalent depth — student-era, every consulting engagement, extracurriculars.

